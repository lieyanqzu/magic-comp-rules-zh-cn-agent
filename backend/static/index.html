<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>万智牌规则裁判 AI Agent</title>
<style>
  :root { --bg: #0f0f1a; --surface: #1a1a2e; --surface2: #16213e; --accent: #e94560; --accent2: #0f3460; --green: #2d6a4f; --yellow: #e9c46a; --text: #e8e8e8; --muted: #7a7a8e; --border: #2a2a3e; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
  header { padding: 10px 20px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  header h1 { font-size: 16px; font-weight: 600; }
  header .badge { font-size: 10px; background: var(--accent); padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  #chat { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }

  /* 用户消息 */
  .msg.user { align-self: flex-end; max-width: 75%; background: var(--accent2); padding: 10px 14px; border-radius: 14px 14px 4px 14px; font-size: 14px; line-height: 1.5; }

  /* Agent 容器 */
  .msg.agent { align-self: flex-start; max-width: 90%; display: flex; flex-direction: column; gap: 8px; }

  /* 思考步骤 */
  .step { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: var(--muted); padding: 6px 10px; border-radius: 8px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); }
  .step .icon { flex-shrink: 0; width: 20px; text-align: center; }
  .step.thinking .icon { color: #6c7ce0; }
  .step.tool-call .icon { color: var(--yellow); }
  .step.tool-result .icon { color: var(--green); }

  /* 工具调用卡片 */
  .tool-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .tool-card .header { padding: 8px 12px; background: rgba(233,196,106,0.08); cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 13px; user-select: none; }
  .tool-card .header:hover { background: rgba(233,196,106,0.12); }
  .tool-card .header .arrow { transition: transform 0.2s; font-size: 10px; color: var(--muted); }
  .tool-card.open .header .arrow { transform: rotate(90deg); }
  .tool-card .body { display: none; padding: 10px 12px; font-size: 12px; border-top: 1px solid var(--border); }
  .tool-card.open .body { display: block; }
  .tool-card .body pre { white-space: pre-wrap; word-break: break-all; color: var(--muted); font-family: 'Cascadia Code', 'Fira Code', monospace; line-height: 1.5; max-height: 300px; overflow-y: auto; }
  .tool-card .body .tag { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 11px; margin-right: 4px; }
  .tag.card { background: rgba(233,69,96,0.15); border: 1px solid rgba(233,69,96,0.3); color: #f08080; }
  .tag.rule { background: rgba(108,124,224,0.15); border: 1px solid rgba(108,124,224,0.3); color: #8895e0; }
  .tag.ok { background: rgba(45,106,79,0.2); border: 1px solid rgba(45,106,79,0.4); color: #6ec89e; }
  .tag.miss { background: rgba(233,69,96,0.1); border: 1px solid rgba(233,69,96,0.2); color: var(--muted); }

  /* 最终回答卡片 */
  .answer-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .answer-card .summary { padding: 10px 14px; background: rgba(233,69,96,0.06); border-left: 3px solid var(--accent); font-weight: 600; font-size: 14px; }
  .answer-card .answer { padding: 12px 14px; font-size: 14px; line-height: 1.7; white-space: pre-wrap; }
  .answer-card .refs { padding: 8px 14px; border-top: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 6px; }
  .answer-card .refs .tag { cursor: pointer; }
  .answer-card .refs .tag:hover { opacity: 0.8; }
  .answer-card .meta-bar { padding: 6px 14px; border-top: 1px solid var(--border); display: flex; gap: 12px; align-items: center; font-size: 12px; color: var(--muted); }
  .answer-card .meta-bar .confidence { padding: 1px 8px; border-radius: 4px; font-weight: 600; font-size: 11px; }
  .confidence.high { background: rgba(45,106,79,0.3); color: #6ec89e; }
  .confidence.medium { background: rgba(233,196,106,0.3); color: var(--yellow); }
  .confidence.low { background: rgba(233,69,96,0.3); color: #f08080; }

  /* Oracle 文本弹窗 */
  .oracle-popup { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
  .oracle-popup.show { display: flex; }
  .oracle-popup .card-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; max-width: 480px; width: 90%; max-height: 80vh; overflow-y: auto; }
  .oracle-popup .card-box h3 { margin-bottom: 4px; }
  .oracle-popup .card-box .sub { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
  .oracle-popup .card-box .oracle { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; font-family: monospace; }
  .oracle-popup .card-box .close-btn { margin-top: 12px; text-align: right; }
  .oracle-popup .card-box .close-btn button { padding: 6px 16px; background: var(--accent); color: #fff; border: none; border-radius: 6px; cursor: pointer; }

  /* 加载动画 */
  .loading { display: flex; gap: 4px; padding: 10px; }
  .loading span { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: dot 1.2s infinite; }
  .loading span:nth-child(2) { animation-delay: 0.2s; }
  .loading span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot { 0%,80%,100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1.2); } }

  /* 输入区 */
  #input-area { padding: 12px 20px; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 10px; flex-shrink: 0; }
  #input { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); font-size: 14px; outline: none; font-family: inherit; resize: none; min-height: 40px; max-height: 120px; }
  #input:focus { border-color: var(--accent); }
  #send { padding: 10px 18px; background: var(--accent); color: #fff; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; flex-shrink: 0; }
  #send:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>
<header>
  <h1>万智牌规则裁判 AI Agent</h1>
  <span class="badge">STREAMING</span>
</header>
<div id="chat"></div>
<div id="input-area">
  <textarea id="input" rows="1" placeholder="输入万智牌规则问题..." oninput="autoResize(this)"></textarea>
  <button id="send" onclick="send()">发送</button>
</div>

<div class="oracle-popup" id="oraclePopup" onclick="closeOracle(event)">
  <div class="card-box">
    <h3 id="oracleName"></h3>
    <div class="sub" id="oracleSub"></div>
    <div class="oracle" id="oracleText"></div>
    <div class="close-btn"><button onclick="document.getElementById('oraclePopup').classList.remove('show')">关闭</button></div>
  </div>
</div>

<script>
const API_BASE = window.location.origin;
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function scrollToBottom() { requestAnimationFrame(() => chat.scrollTop = chat.scrollHeight); }

function addUserMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  div.textContent = text;
  chat.appendChild(div);
  scrollToBottom();
}

function createAgentContainer() {
  const div = document.createElement('div');
  div.className = 'msg agent';
  chat.appendChild(div);
  scrollToBottom();
  return div;
}

function addStep(container, icon, text, cls) {
  const div = document.createElement('div');
  div.className = 'step ' + cls;
  div.innerHTML = `<span class="icon">${icon}</span><span>${esc(text)}</span>`;
  container.appendChild(div);
  scrollToBottom();
  return div;
}

function addToolCard(container, toolName, args, result) {
  const card = document.createElement('div');
  card.className = 'tool-card';
  const argStr = JSON.stringify(args, null, 2);
  const resultStr = result ? JSON.stringify(result, null, 2) : '';

  const toolLabel = toolName === 'resolve_card' ? '🔍 牌张查询' : '📖 规则检索';
  const summaryParts = [];
  if (args.card_name) summaryParts.push(args.card_name);
  if (args.query) summaryParts.push(args.query);
  if (args.section_id) summaryParts.push(`§${args.section_id}`);
  const summary = summaryParts.join(' · ') || toolName;

  card.innerHTML = `
    <div class="header" onclick="this.parentElement.classList.toggle('open')">
      <span class="arrow">▶</span>
      <span>${toolLabel}</span>
      <span style="color:var(--text)">${esc(summary)}</span>
    </div>
    <div class="body">
      <div style="color:var(--muted);margin-bottom:6px">请求参数</div>
      <pre>${esc(argStr)}</pre>
      ${resultStr ? `<div style="color:var(--muted);margin:8px 0 6px">工具结果</div><pre>${esc(resultStr)}</pre>` : ''}
    </div>
  `;
  container.appendChild(card);
  scrollToBottom();
  return card;
}

function updateToolResult(card, result) {
  const body = card.querySelector('.body');
  if (!body) return;
  const resultStr = JSON.stringify(result, null, 2);
  const existing = body.querySelector('pre:last-of-type');
  const hasResult = body.querySelectorAll('pre').length > 1;
  if (!hasResult) {
    const label = document.createElement('div');
    label.style.cssText = 'color:var(--muted);margin:8px 0 6px';
    label.textContent = '工具结果';
    const pre = document.createElement('pre');
    pre.textContent = resultStr;
    body.appendChild(label);
    body.appendChild(pre);
  }
}

function addResultTags(container, result) {
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;flex-wrap:wrap;gap:4px;margin-top:4px';
  if (result.tool === 'resolve_card') {
    if (result.status === 'found') {
      const label = result.name || result.oracle_name || '未知';
      const info = [];
      if (result.mana_cost) info.push(result.mana_cost);
      if (result.display_type) info.push(result.display_type);
      if (result.has_faces) info.push('双面');
      if (result.has_rulings) info.push('FAQ');
      const tooltip = info.join(' · ');
      window._lastCardData = result;
      div.innerHTML = `<span class="tag card" onclick="showCardDetail(window._lastCardData)" title="${esc(tooltip)}">${esc(label)} ✓</span>`;
    } else {
      div.innerHTML = `<span class="tag miss">${esc(result.name || '未找到')} ✗</span>`;
    }
  } else if (result.tool === 'search_rules') {
    div.innerHTML = `<span class="tag rule">${esc(result.section_id || result.query || '检索')}</span>`;
  } else if (result.tool === 'search_cards') {
    if (result.status === 'found' && result.items && result.items.length) {
      const count = result.count || result.items.length;
      div.innerHTML = `<span class="tag ok">找到 ${count} 张牌</span>`;
      const list = document.createElement('div');
      list.style.cssText = 'margin-top:4px;font-size:12px;color:var(--muted)';
      result.items.forEach(item => {
        const name = item.zhs_name || item.face_name || item.name || '?';
        const info = [item.mana_cost, item.type_line].filter(Boolean).join(' · ');
        const pt = item.power ? ` ${item.power}/${item.toughness}` : '';
        list.innerHTML += `<div>• ${esc(name)}${pt} <span style="color:#666">${esc(info)}</span></div>`;
      });
      container.appendChild(list);
    } else {
      div.innerHTML = `<span class="tag miss">未找到匹配牌张</span>`;
    }
  }
  container.appendChild(div);
  scrollToBottom();
}

function addAnswerCard(container, data) {
  const card = document.createElement('div');
  card.className = 'answer-card';
  const conf = data.confidence || 'medium';
  const latency = data.latency_ms ? `${(data.latency_ms/1000).toFixed(1)}s` : '';

  let refsHtml = '';
  if (data.cards && data.cards.length) {
    data.cards.forEach(c => {
      const label = c.name || c.oracle_name || '牌张';
      const info = [];
      if (c.mana_cost) info.push(c.mana_cost);
      if (c.power) info.push(`${c.power}/${c.toughness}`);
      if (c.defense) info.push(`防御:${c.defense}`);
      if (c.display_type || c.translated_type || c.type_line) info.push(c.display_type || c.translated_type || c.type_line);
      if (c.faces && c.faces.length > 1) info.push('双面');
      if (c.rulings && c.rulings.length) info.push(`FAQ:${c.rulings.length}`);
      const tooltip = esc(info.join(' · '));
      window._cards = window._cards || [];
      window._cards.push(c);
      const idx = window._cards.length - 1;
      refsHtml += `<span class="tag card" onclick="showCardDetail(window._cards[${idx}])" title="${tooltip}">${esc(label)}</span>`;
    });
  }
  if (data.rules && data.rules.length) {
    data.rules.forEach(r => {
      refsHtml += `<span class="tag rule" title="${esc(r.content_snippet||'')}">${esc(r.section_id)} ${esc((r.title||'').slice(0,25))}</span>`;
    });
  }

  card.innerHTML = `
    <div class="summary">${esc(data.summary || '')}</div>
    <div class="answer">${esc(data.answer || '')}</div>
    ${refsHtml ? `<div class="refs">${refsHtml}</div>` : ''}
    <div class="meta-bar">
      <span class="confidence ${conf}">${conf.toUpperCase()}</span>
      ${latency ? `<span>${latency}</span>` : ''}
      ${data.needs_human_judge ? '<span style="color:#f08080">⚠ 需要人工裁判</span>' : ''}
    </div>
  `;
  container.appendChild(card);
  scrollToBottom();
}

function showOracle(name, oracleName, text) {
  document.getElementById('oracleName').textContent = name;
  document.getElementById('oracleSub').textContent = oracleName || '';
  document.getElementById('oracleText').textContent = text || '无 Oracle text';
  document.getElementById('oraclePopup').classList.add('show');
}

function showCardDetail(card) {
  let html = `<h3>${esc(card.name || '')}</h3>`;
  if (card.oracle_name && card.oracle_name !== card.name) html += `<div class="sub">${esc(card.oracle_name)}</div>`;
  if (card.mana_cost) html += `<div class="sub">费用: ${esc(card.mana_cost)}`;
  if (card.power) html += ` | ${card.power}/${card.toughness}`;
  if (card.defense) html += ` | 防御: ${card.defense}`;
  if (card.type_line || card.translated_type) html += ` | ${esc(card.translated_type || card.type_line || '')}`;
  html += '</div>';

  if (card.display_text) {
    html += '<div style="margin:12px 0 6px;font-weight:600;font-size:13px">Oracle Text</div>';
    html += `<div class="oracle" style="display:block">${esc(card.display_text)}</div>`;
  }
  if (card.oracle_text_en && card.oracle_text_en !== card.display_text) {
    html += '<div style="margin:8px 0 4px;font-size:12px;color:var(--muted);cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'">English ▾</div>';
    html += `<div class="oracle" style="display:none;font-size:11px;color:#999">${esc(card.oracle_text_en)}</div>`;
  } else if (card.oracle_text && card.oracle_text !== card.display_text) {
    html += '<div style="margin:8px 0 4px;font-size:12px;color:var(--muted);cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'">English ▾</div>';
    html += `<div class="oracle" style="display:none;font-size:11px;color:#999">${esc(card.oracle_text)}</div>`;
  }

  if (card.faces && card.faces.length > 1) {
    card.faces.forEach((f, i) => {
      html += `<div style="margin:12px 0 6px;font-weight:600;font-size:13px">面 ${i + 1}: ${esc(f.face_name || '')}</div>`;
      if (f.translated_text) html += `<div class="oracle" style="display:block;margin-bottom:4px">${esc(f.translated_text)}</div>`;
      if (f.oracle_text) html += `<div class="oracle" style="display:block;font-size:11px;color:#999">${esc(f.oracle_text)}</div>`;
      if (f.power) html += `<div style="font-size:12px;color:var(--muted);margin-top:4px">P/T: ${f.power}/${f.toughness}</div>`;
    });
  }

  if (card.rulings && card.rulings.length) {
    html += `<div style="margin:12px 0 6px;font-weight:600;font-size:13px">FAQ / Rulings (${card.rulings.length})</div>`;
    card.rulings.forEach(r => {
      html += `<div style="font-size:12px;color:var(--muted);margin:4px 0;padding:4px 8px;background:rgba(0,0,0,0.2);border-radius:4px"><b>${esc(r.date)}</b> ${esc(r.text)}</div>`;
    });
  }

  document.getElementById('oracleName').textContent = card.name || '';
  document.getElementById('oracleSub').innerHTML = '';
  document.getElementById('oracleText').innerHTML = html;
  document.getElementById('oraclePopup').classList.add('show');
}
function closeOracle(e) { if (e.target === e.currentTarget) e.currentTarget.classList.remove('show'); }

let isStreaming = false;

async function send() {
  const q = input.value.trim();
  if (!q || isStreaming) return;
  window._cards = [];
  input.value = '';
  autoResize(input);
  addUserMsg(q);

  const container = createAgentContainer();
  const loadingDiv = document.createElement('div');
  loadingDiv.className = 'loading';
  loadingDiv.innerHTML = '<span></span><span></span><span></span>';
  container.appendChild(loadingDiv);
  scrollToBottom();

  isStreaming = true;
  sendBtn.disabled = true;
  let lastToolCard = null;

  try {
    const resp = await fetch(API_BASE + '/v1/judge/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, language: 'zh-CN' }),
    });

    loadingDiv.remove();

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const event = JSON.parse(line.slice(6));
          switch (event.type) {
            case 'start':
              addStep(container, '💬', `收到问题：${event.question}`, 'thinking');
              break;
            case 'thinking':
              addStep(container, '🧠', event.content, 'thinking');
              break;
            case 'tool_call':
              lastToolCard = addToolCard(container, event.tool, event.args);
              addStep(container, '⚡', `调用工具：${event.tool === 'resolve_card' ? '牌张查询' : '规则检索'}`, 'tool-call');
              break;
            case 'tool_result':
              if (lastToolCard) updateToolResult(lastToolCard, event);
              addResultTags(container, event);
              addStep(container, '✅', `工具返回：${event.tool === 'resolve_card' ? (event.status === 'found' ? `找到 ${event.name}` : `未找到 ${event.name}`) : '检索完成'}`, 'tool-result');
              lastToolCard = null;
              break;
            case 'answer':
              addAnswerCard(container, event.data);
              addStep(container, '🎯', '回答生成完毕', 'tool-result');
              break;
            case 'error':
              addStep(container, '❌', event.content, 'thinking');
              break;
            case 'done':
              if (event.latency_ms) addStep(container, '⏱', `总耗时 ${(event.latency_ms/1000).toFixed(1)}s`, 'thinking');
              break;
          }
        } catch {}
      }
    }
  } catch (e) {
    loadingDiv.remove();
    addStep(container, '❌', `请求失败: ${e.message}`, 'thinking');
  } finally {
    isStreaming = false;
    sendBtn.disabled = false;
    input.focus();
  }
}
</script>
</body>
</html>
